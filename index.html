<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fanlaoshi Mini Game</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
    header{background:#fff;padding:18px 12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    h1{margin:0;font-size:22px}
    .wrap{max-width:900px;margin:18px auto;padding:0 12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    a.card{
      display:block;text-decoration:none;color:#111;background:#fff;border-radius:14px;
      padding:16px;box-shadow:0 6px 14px rgba(0,0,0,.10)
    }
    a.card:hover{filter:brightness(.98)}
    .title{font-size:18px;font-weight:700;margin:0 0 6px}
    .desc{margin:0;color:#444;line-height:1.4}
  </style>
</head>
<body>
  <header>
    <h1>Fanlaoshi Mini Game</h1>
    <div style="color:#444;margin-top:8px">Chọn trò chơi để luyện Hán tự & Pinyin</div>
  </header>

  <div class="wrap">
    <div class="grid">
      <a class="card" href="match.html">
        <p class="title">1) Ghép Hán tự – Pinyin</p>
        <p class="desc">Chọn 1 chữ và 1 pinyin đúng với nhau.</p>
      </a>

      <a class="card" href="quiz.html">
        <p class="title">2) Trắc nghiệm Pinyin</p>
        <p class="desc">Nhìn chữ và chọn pinyin đúng.</p>
      </a>

      <a class="card" href="typing.html">
        <p class="title">3) Gõ Pinyin</p>
        <p class="desc">Nhìn chữ và gõ pinyin.</p>
      </a>
    </div>
  </div>
</body>
</html>
